app = "lms-thpt-camau"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[env]
  NODE_ENV = "production"
  DISABLE_CONSOLE_LOG = "true"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256