services:
  - type: web
    name: lms-thpt-camau
    env: node
    region: singapore
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: TEACHER_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://lms-thpt-camau.vercel.app
